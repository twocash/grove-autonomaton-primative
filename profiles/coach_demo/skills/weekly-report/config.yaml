# weekly-report skill
name: "Weekly Practice Plan"
description: "Generate structured weekly practice plans integrating skill development with character formation"
version: "2.0"
tier: 2
zone: green
domain: lessons
intent_type: actionable

triggers:
  - "practice plan"
  - "weekly session"
  - "weekly practice"
  - "plan this week"
  - "what should we work on"

inputs:
  - seasonal-context (dock)
  - player profiles (entities/players)
  - content pillars (config/pillars.yaml)
  - goals (dock/goals.md)

outputs:
  - type: practice_plan
    format: structured_text
    destination: output/reports/

telemetry_exhaust:
  - Weekly drill effectiveness (which drills get repeated vs dropped)
  - Player pairing patterns (which combinations produce results)
  - Content seed generation rate (how many filmable moments per week)
  - Match proximity correlation (how practice changes near match day)
