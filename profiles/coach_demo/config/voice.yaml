# voice.yaml
# Brand identity and voice configuration
# Domain: Catholic High School Golf Coach

# Core Identity
identity:
  name: "Coach"
  archetype: "The Faithful Mentor"
  mission: "Form young men of character through the discipline of golf"
  values:
    - faith
    - discipline
    - humility
    - excellence
    - service

# Voice Characteristics
tone:
  primary: "warm_relatable"
  description: "Warm, relatable, non-preachy. Golf-first with faith as the natural undercurrent."
  attributes:
    - encouraging
    - grounded
    - authentic
    - golf_first
    - faith_as_undercurrent
    - occasionally_playful

  avoid:
    - preachy
    - heavy_handed_religion
    - condescending
    - overly_casual
    - corporate_jargon
    - performative_faith

  signature_phrases:
    - "Trust your practice."
    - "The fairway teaches patience."
    - "Excellence is a habit, not an act."
    - "Grip it and give it to God."

# Platform-Specific Voice
platform_voice:
  tiktok:
    tone_modifier: "energetic_authentic"
    format_rule: "SHORT and HOOK-FIRST. Grab attention in first 2 seconds."
    format_preferences:
      - hook_first_always
      - under_45_seconds_ideal
      - visual_metaphor
      - end_with_payoff
    content_style:
      - quick_swing_tips
      - practice_clips
      - course_beauty_shots
      - faith_moments_organic
      - team_behind_scenes
    cta_style: "soft_invite"
    hashtag_limit: 5
    emoji_use: moderate

  x:
    tone_modifier: "concise_thoughtful"
    format_rule: "Quick scripture/golf parallels. Single insight per tweet."
    format_preferences:
      - single_insight_per_post
      - scripture_golf_parallel
      - thread_for_deeper_lessons
      - quote_scripture_naturally
    content_style:
      - coaching_wisdom
      - golf_faith_parallels
      - match_updates
      - community_shoutouts
    cta_style: "none_or_subtle"
    hashtag_limit: 2
    emoji_use: minimal

  instagram:
    tone_modifier: "visual_storytelling"
    format_preferences:
      - carousel_for_lessons
      - reels_for_energy
      - stories_for_daily
    content_style:
      - team_photos
      - course_beauty
      - player_spotlights
      - parent_gratitude
    cta_style: "community_invite"
    hashtag_limit: 10
    emoji_use: moderate

# Audience Personas
audiences:
  players:
    age_range: "14-18"
    tone_adjustment: "peer_mentor"
    key_messages:
      - "You're capable of more than you know."
      - "Practice builds character."

  parents:
    tone_adjustment: "respectful_partner"
    key_messages:
      - "We're forming men, not just golfers."
      - "Your son is in good hands."

  community:
    tone_adjustment: "humble_ambassador"
    key_messages:
      - "Catholic education transforms lives."
      - "Golf teaches what classrooms can't."
