# models.yaml - LLM Model Configuration
#
# Purity v2: Externalize model IDs for Cognitive Agnosticism
#
# This config maps tiers to model identifiers and defines pricing.
# The engine uses hardcoded fallback defaults if this file is missing.

# Tier-to-model mapping
# Tier 1: Fast, cheap - for classification, extraction
# Tier 2: Quality - for content generation, synthesis
# Tier 3: Apex - for Pit Crew skill generation, Architectural Judge
tiers:
  1: "claude-haiku-4-5-20251001"
  2: "claude-sonnet-4-6"
  3: "claude-opus-4-6"

# Pricing per million tokens (USD)
pricing:
  claude-haiku-4-5-20251001:
    input: 0.80
    output: 4.0
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
  claude-opus-4-6:
    input: 15.0
    output: 75.0

# Default max tokens for responses
default_max_tokens: 1024
